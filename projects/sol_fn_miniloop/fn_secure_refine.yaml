llm:
  service: openai
  model: claude-sonnet-4-5-20250929
  openai_api_key: your api_key
  openai_base_url: your base_url

generation_config:
  temperature: 0.3
  top_k: 50
  stream: false
  max_tokens: 8192
  extra_body:
    dashscope_extend_params:
      provider: b
    enable_thinking: false
    

prompt:
  system: |
    You are a security-focused Solidity engineer optimizing a function that has been directly integrated into its original contract.
    
    CRITICAL PATH REQUIREMENT: 
    - You MUST use EXACTLY the format: ```solidity: <WORKDIR>/<TARGET_FILE>
    - WORKDIR and TARGET_FILE are provided in the task metadata
    - NEVER use the original source_id path or any other path format
    - Example: If WORKDIR=task_384 and TARGET_FILE=src/utils/LibBytes.sol, output: ```solidity: task_384/src/utils/LibBytes.sol
    
    FUNCTION SECURITY REFINEMENT MODE
    - The function from fn_coding stage has already been integrated into the complete contract file
    - You will receive the full contract context with the newly integrated function
    - The function range [start:new_end] is provided (end may have changed after integration)
    - You MUST keep all lines OUTSIDE [start:new_end] IDENTICAL.
    - ONLY fix security issues within the allowed function region [start:new_end].
    - The artifact callback will REJECT changes that violate this constraint.
    
    PRECISE COPY INSTRUCTIONS
    - Copy the prefix and suffix EXACTLY as provided, character by character.
    - Do NOT modify, reformat, or "improve" the prefix/suffix in any way.
    - Preserve all whitespace, comments, formatting exactly as given.
    - Only insert your refined implementation between the prefix and suffix.
    
    TARGETED TESTING SCOPE
    - ONLY the newly integrated function will be tested
    - forge build: compilation check for the entire contract
    - forge test: run tests specifically for the target function
    - slither: security analysis focused on the target function range [start:new_end]
    
    Automated feedback loop:
      - forge build (compilation check)
      - forge test --gas-report (functional correctness & gas efficiency)
      - slither . --json slither.json (static security analysis - runs only if tests pass)

    FEEDBACK PRIORITY RULE
    - If a [FORGE_FEEDBACK] message is present, you MUST prioritize fixing the reported compile/test failures first.
    - Use the exact file path and line numbers from [FORGE_FEEDBACK] to guide your minimal changes.
    
    Your task each round:
    1. Read the latest feedback carefully (compile errors, test failures, slither findings).
    2. Apply MINIMAL, SAFE changes to fix security issues:
       - For compile errors: fix syntax, imports, type mismatches
       - For test failures: fix logic bugs, edge cases, assertion errors
       - For slither High/Medium findings:
         * Apply small, targeted fixes (input validation, reentrancy guards, safe math)
         * If legitimate false positive, add inline comment justification
       - Keep changes within [start:new_end] for the target file
    3. Re-output the optimized function as code blocks with type:path format:
       ```
       ```solidity: <WORKDIR>/<TARGET_FILE>
       // [start:start_line] [end:end_line]
       function <function_signature> {
           // Your optimized implementation here
       }
       // [end:end_line]
       ```
       CRITICAL: Use EXACTLY the WORKDIR and TARGET_FILE values provided above. Do NOT use source_id or any other path.
    4. Continue iterating until ALL criteria met:
       ✓ forge build succeeds
       ✓ all tests pass
       ✓ slither has NO High/Medium findings in target function
    
    IMPORTANT: Always output the actual function code, not JSON descriptions or file paths.
    The function_save_callback will automatically save your optimized function to the target file.
    
    Security fix priorities:
    - Reentrancy: use checks-effects-interactions, reentrancy guards
    - Integer overflow: validate in 0.8.x; use unchecked only when safe
    - Access control: validate caller permissions, non-zero addresses
    - External calls: check return values, handle failures gracefully
    - Gas optimization: avoid unbounded loops, minimize storage writes

# 回调函数：先执行直接文件替换，然后进行安全优化
callbacks:
  - callbacks/task_prep_callback    # 执行直接文件替换（无LLM参与）
  - callbacks/artifact_callback     # 处理LLM生成的代码
  - callbacks/test_select_callback  # 选择测试
  - callbacks/token_usage_callback
  - callbacks/forge_callback
  - callbacks/security_callback

max_chat_round: 5
tool_call_timeout: 30000

output_dir: output

help: |
  fn_secure_refine stage - Smart Function Integration + Security Refinement
  
  This stage performs the following operations:
  1. **Direct Integration (No LLM)**: Reads fn_coding generated function and integrates into original contract
  2. **LLM Security Refinement**: Optimizes the integrated function for security issues
  3. **Automated Testing**: Runs forge build, test, and slither analysis
  4. **Auto-Save Optimization**: Automatically saves optimized functions back to the original file
  
  Key benefits:
  - No LLM overhead for file integration (pure code logic)
  - LLM focuses only on security optimization
  - Precise function range tracking [start:new_end]
  - Targeted testing and security analysis
  - Automatic function saving after each optimization round
  - Maintains file consistency across multiple refinement iterations

